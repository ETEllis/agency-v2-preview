<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#101114"/>
  
  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#2E3542" stroke-width="0.5" opacity="0.3"/>
    </pattern>
    <radialGradient id="glow" cx="600" cy="315" r="400">
      <stop offset="0%" stop-color="#E2B76D" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#E2B76D" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  
  <!-- ASCII Wordmark -->
  <g font-family="monospace" font-size="16" fill="#E8E3D6" opacity="0.08" text-anchor="middle">
    <text x="600" y="80">    _                                       </text>
    <text x="600" y="100">   / \\   _ __    __ _  _ __  ___  ___  ___ </text>
    <text x="600" y="120">  / _ \\ | '_ \\  / _` || '__|/ _ \\/ __|/ __|</text>
    <text x="600" y="140"> / ___ \\| |_) || (_| || |  |  __/\\__ \\__ \\</text>
    <text x="600" y="160">/_/   \\_\\ .__/  \\__,_||_|   \\___||___/|___/</text>
    <text x="600" y="180">        |_|                                 </text>
  </g>
  
  <!-- Main title -->
  <text x="600" y="300" text-anchor="middle" font-family="monospace" font-size="72" font-weight="bold" fill="#E2B76D" letter-spacing="4">&gt; agency</text>
  
  <!-- Tagline -->
  <text x="600" y="380" text-anchor="middle" font-family="monospace" font-size="32" fill="#E8E3D6" letter-spacing="2">Your intent, multiplied.</text>
  
  <!-- Terminal prompt decoration -->
  <rect x="200" y="450" width="800" height="80" rx="8" fill="#171A20" stroke="#2E3542" stroke-width="1"/>
  <text x="240" y="500" font-family="monospace" font-size="22" fill="#7B8394">$ </text>
  <text x="265" y="500" font-family="monospace" font-size="22" fill="#E8E3D6">npm install -g @agency/cli</text>
  
  <!-- Badge -->
  <rect x="530" y="560" width="140" height="36" rx="18" fill="#E2B76D" fill-opacity="0.15" stroke="#E2B76D" stroke-width="1"/>
  <text x="600" y="584" text-anchor="middle" font-family="monospace" font-size="14" fill="#E2B76D">OPEN SOURCE</text>
</svg>